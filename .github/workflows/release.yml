name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload Python artifacts
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  build-fwupdater:
    name: fwupdater (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x86_64
          - os: macos-latest
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: tools/fwupdater

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          pkg-config \
          libudev-dev

      - name: Build
        run: cargo build --release

      - name: Package Linux/macOS binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir package
          cp target/release/et44fwupdater package/
          tar czf et44fwupdater-${{ matrix.name }}.tar.gz package
          sha256sum et44fwupdater-${{ matrix.name }}.tar.gz > et44fwupdater-${{ matrix.name }}.sha256

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive target\release\et44fwupdater.exe et44fwupdater-${{ matrix.name }}.zip
          Get-FileHash et44fwupdater-${{ matrix.name }}.zip -Algorithm SHA256 |
            Select-Object -ExpandProperty Hash |
            Out-File et44fwupdater-${{ matrix.name }}.sha256

      - name: Upload Linux/macOS assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tools/fwupdater/*.tar.gz
            tools/fwupdater/*.sha256

      - name: Upload Windows assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tools/fwupdater/*.zip
            tools/fwupdater/*.sha256

  update-release-notes:
    name: Update release notes
    if: github.event_name == 'release'
    needs:
      - build-python
      - build-fwupdater

    runs-on: ubuntu-latest

    steps:
      - name: Append installation information
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;

            const body =
              (release.body || "") +
              `

            ---

            ## Installation

            Python package:

            \`\`\`bash
            pip install ET44
            \`\`\`

            Firmware updater:

            no installation required

            ## Included assets

            ### Python package

            - Wheel (.whl)
            - Source distribution (.tar.gz)

            ### Firmware updater binaries

            - Linux x86_64
            - Windows x86_64
            - macOS Apple Silicon (AMD64)
            `;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body
            });
